# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  redis:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: always

  litellm:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    restart: always

  gateway:
    environment:
      - NODE_ENV=production
      - AIRAILS_PORT=8080
      - AIRAILS_SECRET=${AIRAILS_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LITELLM_URL=http://litellm:4000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: always

  dashboard:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL}
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITLAB_CLIENT_ID=${GITLAB_CLIENT_ID:-}
      - GITLAB_CLIENT_SECRET=${GITLAB_CLIENT_SECRET:-}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: always

  webhook:
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=8081
      - AIRAILS_WEBHOOK_SECRET=${AIRAILS_WEBHOOK_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: always
