name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"

env:
  AIRAILS_SECRET: ci-test-secret
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
  AUTH_SECRET: ci-test-secret
  AUTH_TRUST_HOST: "true"

jobs:
  check:
    name: Lint, Type-check, Unit Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npx turbo lint typecheck
      - run: npx turbo test:unit -- --coverage
      - run: npx turbo build

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: airails_test
          POSTGRES_USER: airails
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://airails:test@localhost:5432/airails_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma generate --schema prisma/schema.prisma
      - run: npx prisma db push
      - run: npx turbo test:integration --concurrency 1
