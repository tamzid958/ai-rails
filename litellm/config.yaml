model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250620

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20250320

  - model_name: llama4
    litellm_params:
      model: ollama/llama4

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 30
  retry_after: 5
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

  # Fallback chain — if primary model fails, try these
  default_fallbacks:
    - gpt-4o-mini

router_settings:
  enable_pre_call_checks: true
  retry_policy:
    RateLimitError:
      num_retries: 3
      retry_after: 10
    ContentPolicyViolationError:
      num_retries: 0

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  enable_model_discovery: true
