model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6-20250620

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20250320

  - model_name: llama4
    litellm_params:
      model: ollama/llama4

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
